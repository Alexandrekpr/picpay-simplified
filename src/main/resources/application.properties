spring.application.name=picpay-simplified
spring.datasource.url=jdbc:h2:mem:picpay-simplified;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

// para visualizar o console do H2, acesse http://localhost:8080/h2-console
spring.h2.console.enabled=true